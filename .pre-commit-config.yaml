exclude: '^\.forum/'
repos:
  - repo: local
    hooks:
      - id: fix-index-blobs
        name: fix index blobs
        entry: scripts/fix-index-blobs.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        types: [rust]
        pass_filenames: false
